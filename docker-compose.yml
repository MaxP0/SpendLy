services:
  db:
    image: postgres:16-alpine
    container_name: spendly_db
    environment:
      POSTGRES_USER: spendly_user
      POSTGRES_PASSWORD: spendly_password
      POSTGRES_DB: spendly_db
    ports:
      - "5432:5432"
    volumes:
      - spendly_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spendly_user -d spendly_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - spendly_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: spendly_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://spendly_user:spendly_password@db:5432/spendly_db
      JWT_SECRET: change-me-before-production
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      CORS_ORIGINS: http://localhost:5173
      OPENAI_API_KEY: replace-with-openai-key
      TESSERACT_CMD: ""
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./database:/database
    command: sh -c "cd /database && PYTHONPATH=/app alembic -c alembic.ini upgrade head && cd /app && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    working_dir: /app
    networks:
      - spendly_network

  frontend:
    image: node:20
    container_name: spendly_frontend
    working_dir: /app
    command: sh -c "npm install --no-package-lock && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - spendly_frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - spendly_network

volumes:
  spendly_postgres_data:
    driver: local
  spendly_frontend_node_modules:
    driver: local

networks:
  spendly_network:
    driver: bridge
