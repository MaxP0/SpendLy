version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: spendly_db
    environment:
      POSTGRES_USER: spendly_user
      POSTGRES_PASSWORD: spendly_password
      POSTGRES_DB: spendly_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spendly_user -d spendly_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - spendly_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: spendly_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://spendly_user:spendly_password@postgres:5432/spendly_db
      SECRET_KEY: your-secret-key-change-in-production
      OPENAI_API_KEY: sk-...
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - spendly_network

volumes:
  postgres_data:
    driver: local

networks:
  spendly_network:
    driver: bridge
